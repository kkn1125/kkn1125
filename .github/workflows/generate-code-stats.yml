name: Generate code statistics

on:
  schedule:
    - cron: "47 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-code-stats.yml"
      - "scripts/generate-code-stats.mjs"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate code statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-code-stats.mjs

      - name: Commit updated statistics
        run: |
          if git diff --quiet -- assets/code-stats.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/code-stats.svg
          git commit -m "chore: update code statistics"
          git push
